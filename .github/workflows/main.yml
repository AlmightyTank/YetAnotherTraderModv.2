name: Build & Package (SPT Mod)

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      # Package into the "full SPT path" zip layout:
      # SPT/user/mods/Priscilu_Origins_v2/
      - name: Package SPT layout
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $repo = "${{ github.workspace }}"
          $outDir = Join-Path $repo "bin\Release\Priscilu_Origins"
          if (!(Test-Path $outDir)) {
            throw "Build output not found: $outDir"
          }

          $packageRoot = Join-Path $repo "package"
          $target = Join-Path $packageRoot "SPT\user\mods\Priscilu_Origins_v2"

          New-Item -ItemType Directory -Force -Path $target | Out-Null

          # Copy build output (dll, deps, Data) - Explicitly exclude PDBs etc.
          Copy-Item -Path (Join-Path $outDir "Priscilu_Origins.dll") -Destination $target -Force
          Copy-Item -Path (Join-Path $outDir "Priscilu_Origins.deps.json") -Destination $target -Force
          Copy-Item -Path (Join-Path $outDir "Data") -Destination $target -Recurse -Force

          # Create zip
          $zipName = "Priscilu_Origins_v2-${{ github.ref_name }}.zip"
          $zipPath = Join-Path $repo $zipName

          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $packageRoot "SPT") -DestinationPath $zipPath -Force

          Write-Host "ZIP created: $zipPath"

      - name: Upload Artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: Priscilu_Origins_v2-zip
          path: |
            Priscilu_Origins_v2-*.zip

  release:
    # Only run when pushing tags like v1.2.3
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact (ZIP)
        uses: actions/download-artifact@v4
        with:
          name: Priscilu_Origins_v2-zip

      - name: Create GitHub Release + Upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: Priscilu_Origins_v2-*.zip
          generate_release_notes: true
